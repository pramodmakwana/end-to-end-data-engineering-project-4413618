version: 2

models:
  - name: stg_customer
    columns:
      - name: customer_id
        description: Unique id that identifies a customer
        data_tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        description: Unique id that identifies an order
        data_tests:
          - unique
          - not_null

      - name: customer_id
        description: Unique id that identifies a customer.It holds a reference to the stg_customer model.
        data_tests:
          - relationships:
              arguments:  
                to: ref('stg_customer')
                field: customer_id

      - name: order_status
        description: The status of the order.It gets upadated very time there's a change in oder status
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - 'canceled'
                  - 'unavailable'
                  - 'approved'
                  - 'created'
                  - 'delivered'
                  - 'shipped'
                  - 'invoiced'
                  - 'processing'